<!--
  COMPONENT 1 — NAVBAR
  Pax Via Tours & Travel

  Reusable navbar partial. Paste inside <header class="navbar" id="navbar"> on every page.
  JS in animations.js handles: sticky (.is-sticky), hamburger (.is-open).
  All responsive behavior in css/responsive.css.

  Usage:
    - index.html:  aria-current="page" on "All Tours" link
    - tour.html:   no aria-current (no active nav item)
    - terms.html:  aria-current="page" on "Terms & Conditions" link
-->

<div class="container">
  <div class="navbar__inner">

    <a class="navbar__brand" href="index.html" aria-label="Pax Via Tours — Home">
      <img class="navbar__logo"
           src="./assets/logos/pax-via-logo.png"
           alt="Pax Via Tours &amp; Travel logo"
           width="90" height="90">
      <span class="navbar__brand-name">Pax Via Tours</span>
    </a>

    <nav class="navbar__nav" aria-label="Main navigation" id="navbar__menu">
      <ul class="navbar__links">
        <li><a href="index.html">All Tours</a></li>
        <li><a href="terms.html">Terms &amp; Conditions</a></li>
        <li><a href="mailto:info@paxvia.com">Contact</a></li>
      </ul>
    </nav>

    <button class="navbar__hamburger"
            aria-label="Open navigation menu"
            aria-expanded="false"
            aria-controls="navbar__menu">
      <span aria-hidden="true"></span>
      <span aria-hidden="true"></span>
      <span aria-hidden="true"></span>
    </button>

  </div>
</div>
